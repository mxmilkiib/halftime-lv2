<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Half new moon rotated 45 degrees clockwise -->
  <g transform="rotate(45, 32, 32)">
    <!-- Outer circle -->
    <circle cx="32" cy="32" r="28" fill="#e94560"/>
    <!-- Inner circle offset to create crescent (right half dark) -->
    <circle cx="44" cy="32" r="24" fill="#12121a"/>
  </g>
</svg>
